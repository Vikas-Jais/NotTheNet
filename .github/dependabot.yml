# Dependabot — automated dependency updates
# https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  # Python (pip) dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "retr0verride"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "retr0verride"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
